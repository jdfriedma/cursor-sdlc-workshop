<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f4f7fb" />
  <rect x="40" y="40" width="1200" height="640" rx="28" fill="#ffffff" stroke="#93a1a1" stroke-width="4" stroke-dasharray="18 12" />
  <text x="640" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#268bd2">PLACEHOLDER</text>
  <text x="640" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#657b83">IDE Surface</text>
  <text x="640" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#657b83">Show the Cursor IDE with the four quadrants labeled:</text>
  <text x="640" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#657b83">files, editor, chat pane, and terminal.</text>
  <text x="640" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#657b83">Optional inset: Glass or multi-agent view.</text>
  <text x="640" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#93a1a1">Goal: make the IDE feel discoverable, visual, and clearly richer than raw CLI.</text>
