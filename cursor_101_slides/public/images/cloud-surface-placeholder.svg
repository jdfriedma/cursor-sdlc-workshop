<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f4f7fb" />
  <rect x="40" y="40" width="1200" height="640" rx="28" fill="#ffffff" stroke="#93a1a1" stroke-width="4" stroke-dasharray="18 12" />
  <text x="640" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#268bd2">PLACEHOLDER</text>
  <text x="640" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#657b83">Cloud Surface</text>
  <text x="640" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#657b83">Show a Cursor cloud agent session in the browser.</text>
  <text x="640" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#657b83">Ideal companion inset: an Automation with scheduled triggers and MCPs.</text>
  <text x="640" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#657b83">Slack, Notion, or Linear connections are a plus.</text>
  <text x="640" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#93a1a1">Goal: make the Cloud feel async, remote, and accessible beyond developers.</text>
